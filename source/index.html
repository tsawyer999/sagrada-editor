<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sagrada Editor</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
    <link rel="stylesheet" href="css/app.css"/>
    <script type="module" src="js/i18n.js"></script>
    <script type="module" src="js/app.js"></script>
</head>
<body>
<div class="vertical-container">
    <div class="title">Sagrada Editor</div>
    <div>
        <div class="horizontal-container">
            <div class="vertical-container">
                <div class="dice">
                    <div class="side one"></div>
                </div>
                <div class="dice">
                    <div class="side two"></div>
                </div>
                <div class="dice">
                    <div class="side three"></div>
                </div>
                <div class="dice">
                    <div class="side four"></div>
                </div>
                <div class="dice">
                    <div class="side five"></div>
                </div>
                <div class="dice">
                    <div class="side six"></div>
                </div>
            </div>
            <div class="vertical-container">
                <div class="dice dice-red">red</div>
                <div class="dice dice-yellow">yellow</div>
                <div class="dice dice-green">green</div>
                <div class="dice dice-blue">blue</div>
                <div class="dice dice-purple">purple</div>
            </div>
            <div class="vertical-container">
                <div class="card">
                    <div class="horizontal-container">
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                    </div>
                    <div class="horizontal-container">
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                    </div>
                    <div class="horizontal-container">
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                    </div>
                    <div class="horizontal-container">
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                        <div class="dice"></div>
                    </div>
                    <div class="horizontal-container">
                        <div class="title">fractial drops</div>
                        <div class="difficulty">
                            <div class="difficulty-dot"></div>
                            <div class="difficulty-dot"></div>
                            <div class="difficulty-dot"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script language="javascript">
    document.addEventListener(
        'DOMContentLoaded', () => {
            // loadGrid();
        });
</script>
<footer data-i18n="footer">Hollox©2026</footer>
</body>
</html>
