name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: bash scripts/build.sh

      - name: Create zip archive
        run: zip -r sagrada-editor.${{ github.ref_name }}.zip dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: sagrada-editor.${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Octopus CLI
        uses: OctopusDeploy/install-octopus-cli-action@v3

      - name: Push to Octopus Deploy
        env:
          OCTOPUS_URL: ${{ vars.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
          OCTOPUS_SPACE: ${{ vars.OCTOPUS_SPACE }}
        run: |
          octopus package upload --package=sagrada-editor.${{ github.ref_name }}.zip
